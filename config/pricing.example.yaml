enabled: true
mode: api
endpoint: "<pricing-catalog-url>"
auth_header: "x-api-key"
api_key_env: "PRICING_API_KEY"
cache_ttl_hours: 24
cache_path: "cache/models.json"
unit: "per_1m_tokens"
currency: "EUR"

model_key_fields:
  - systemName
  - name

price_fields:
  input: inputPrice
  output: outputPrice
  cached_read: cachedTokenReadPrice
  cached_creation: cachedTokenCreationPrice

aliases:
  cg-cheap:
    - provider.small-model
  cg-standard:
    - provider.model-name
    - provider.region.model-name
  cg-strong:
    - provider.large-model

fallback:
  enabled: true
  cost_per_1m_tokens: 1.0
